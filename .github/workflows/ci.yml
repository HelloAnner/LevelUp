name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm --filter @levelup/web build

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Visual regression smoke
        run: pnpm exec playwright test smoke-themes --project=desktop --reporter=line
